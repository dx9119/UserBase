<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${pageTitle}">UserBase</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">
    <nav th:fragment="nav" class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" th:href="@{/home}">UserBase</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <div class="nav-item d-flex align-items-center">
                        <div th:replace="~{fragments/theme-toggle :: theme-toggle}"></div>
                        <div th:replace="~{fragments/language-selector :: language-selector}"></div>
                        <form th:action="@{/logout}" method="post" class="ms-3">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-outline-light btn-sm" th:text="#{home.logout}">Выйти</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <div th:fragment="content" class="container mt-4 flex-grow-1">
        <div th:replace="${contentFragment} :: content"></div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
