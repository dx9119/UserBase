<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras-spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{password.title}">Смена пароля</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-11 col-sm-10 col-md-6">
                <div class="card">
                    <div class="card-header bg-warning">
                        <h4 class="mb-0" th:text="#{password.title}">Смена пароля</h4>
                    </div>
                    <div class="card-body">
                        <form th:action="@{/profile/change-password}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label th:text="#{password.old}" class="form-label">Текущий пароль</label>
                                <input type="password" name="oldPassword" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label th:text="#{password.new}" class="form-label">Новый пароль</label>
                                <input type="password" name="newPassword" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label th:text="#{password.confirm}" class="form-label">Подтвердите пароль</label>
                                <input type="password" name="confirmPassword" class="form-control" required/>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-warning" th:text="#{password.submit}">Изменить пароль</button>
                            </div>
                        </form>
                        <div th:if="${error}" class="alert alert-danger mt-3" th:text="${error}"></div>
                    </div>
                    <div class="card-footer text-center">
                        <a th:href="@{/profile}" th:text="#{password.backProfile}">Вернуться в профиль</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
