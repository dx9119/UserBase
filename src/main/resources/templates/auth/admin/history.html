<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{admin.history.title}">История состояний</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
    <nav th:replace="~{fragments/layout :: nav}"></nav>

    <div class="container mt-4">
        <div class="d-flex flex-column flex-sm-row justify-content-between align-items-center mb-4 gap-2">
            <h1 th:text="#{admin.history.title}">История состояний пользователя</h1>
            <a th:href="@{/admin}" class="btn btn-secondary" th:text="#{admin.back}">Назад</a>
        </div>

        <div class="row">
            <div class="col-12 mb-3" th:each="item : ${history.content}">
                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <span th:switch="${item.userState}">
                            <span th:case="'ACTIVE'" class="badge bg-success" th:text="#{admin.history.state.active}">Active</span>
                            <span th:case="'PAUSED'" class="badge bg-warning text-dark" th:text="#{admin.history.state.paused}">Paused</span>
                            <span th:case="'BLOCKED'" class="badge bg-danger" th:text="#{admin.history.state.blocked}">Blocked</span>
                            <span th:case="'AUTO_CREATED'" class="badge bg-info" th:text="#{admin.history.state.autoCreated}">Auto Created</span>
                            <span th:case="'UPDATED'" class="badge bg-primary" th:text="#{admin.history.state.updated}">Updated</span>
                            <span th:case="*" class="badge bg-secondary" th:text="${item.userState}">-</span>
                        </span>
                        <small class="text-muted" th:text="${#temporals.format(item.changedAt, 'dd.MM.yyyy HH:mm')}">01.01.2024 12:00</small>
                    </div>
                    <div class="card-body">
                        <p class="card-text mb-1">
                            <strong th:text="#{admin.history.author}">Автор:</strong>
                            <span th:text="${item.changeAuthor?.username}">-</span>
                        </p>
                        <p class="card-text mb-0" th:text="${item.comment}">Comment</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="text-center text-muted py-4" th:if="${history.content.isEmpty()}" th:text="#{admin.history.empty}">
            Нет записей
        </div>

        <nav th:if="${history.totalPages > 1}" aria-label="Page navigation">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${history.first} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/history/{id}(id=${param.id}, page=${history.number - 1}, size=${history.size})}">Предыдущая</a>
                </li>
                <li class="page-item" th:each="i : ${#numbers.sequence(0, history.totalPages - 1)}" th:classappend="${i == history.number} ? 'active'">
                    <a class="page-link" th:href="@{/admin/history/{id}(id=${param.id}, page=${i}, size=${history.size})}" th:text="${i + 1}">1</a>
                </li>
                <li class="page-item" th:classappend="${history.last} ? 'disabled'">
                    <a class="page-link" th:href="@{/admin/history/{id}(id=${param.id}, page=${history.number + 1}, size=${history.size})}">Следующая</a>
                </li>
            </ul>
        </nav>
    </div>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
