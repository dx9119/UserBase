<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{login.title}">Вход</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-11 col-sm-10 col-md-6">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0" th:text="#{login.title}">Вход</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3 text-end d-flex justify-content-end align-items-center">
                            <div th:replace="~{fragments/theme-toggle :: theme-toggle}"></div>
                            <div th:replace="~{fragments/language-selector :: language-selector}"></div>
                        </div>
                        <form th:action="@{/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <div class="mb-3">
                                <label th:text="#{login.username}" class="form-label">Имя пользователя</label>
                                <input type="text" name="username" class="form-control" required/>
                            </div>
                            <div class="mb-3">
                                <label th:text="#{login.password}" class="form-label">Пароль</label>
                                <input type="password" name="password" class="form-control" required/>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-primary" th:text="#{login.submit}">Войти</button>
                            </div>
                        </form>
                        <div th:if="${param.error}" class="alert alert-danger mt-3" th:text="#{login.error}">Неверное имя пользователя или пароль</div>
                        <div th:if="${param.logout}" class="alert alert-success mt-3" th:text="#{login.logout}">Вы вышли из системы</div>
                    </div>
                    <div class="card-footer text-center">
                        <span class="text-muted" th:text="#{register.login}">Нет аккаунта?</span>
                        <a th:href="@{/register}" th:text="#{register.title}">Регистрация</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/theme.js}"></script>
</body>
</html>
