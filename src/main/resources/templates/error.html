<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="#{error.title}">Ошибка</title>
    <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-11 col-sm-10 col-md-6">
                <div class="card border-danger">
                    <div class="card-header bg-danger text-white">
                        <h4 class="mb-0" th:text="#{error.title}">Ошибка</h4>
                    </div>
                    <div class="card-body">
                        <div class="alert alert-danger">
                            <p class="mb-1"><strong th:text="#{error.httpStatus}">HTTP код</strong>: <span th:text="${httpStatus}">-</span></p>
                            <p class="mb-1"><strong th:text="#{error.time}">Время</strong>: <span th:text="${errorTime}">-</span></p>
                            <p class="mb-1"><strong th:text="#{error.ip}">Ваш IP</strong>: <span th:text="${errorIp}">-</span></p>
                            <hr>
                            <p class="mb-0"><strong th:text="#{error.message}">Сообщение</strong>: <span th:text="${errorMessage}">-</span></p>
                        </div>
                    </div>
                    <div class="card-footer text-center">
                        <a th:href="@{/home}" class="btn btn-primary" th:text="#{error.backHome}">На главную</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
